  <circle cx="640" cy="204" r="17" fill="#0d1117" stroke="#ffffff" stroke-width="4"/>
  <circle cx="640" cy="204" r="7" fill="#ffffff"/>

  <rect x="262" y="296" width="290" height="52" rx="26" fill="#ffffff" fill-opacity="0.1" stroke="#ffffff" stroke-opacity="0.16"/>
